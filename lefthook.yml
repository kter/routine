pre-commit:
  commands:
    full-unit-tests:
      run: make test-unit-full
    backend-lint:
      run: make lint-backend-fast
    backend-format:
      run: make format-check-backend
    frontend-lint:
      run: make lint-frontend
    frontend-format:
      run: make format-check-frontend

pre-push:
  commands:
    full-unit-tests:
      run: make test-unit-full
    integration-tests:
      run: make test-integration
